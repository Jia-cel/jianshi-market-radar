<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 见势</title>
  <style>
    :root {
      --bg: #070d17; --panel: #0d1725; --line: rgba(148,163,184,.12);
      --text: #edf4ff; --muted: #8090a6; --faint: #56657a;
      --cyan: #25d4c4; --cyan-2: #70f3e7; --radius: 16px;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(circle at 50% -30%, rgba(37,212,196,.1), transparent 50%), var(--bg);
      color: var(--text);
    }
    .login-card {
      width: min(400px, 92vw); background: linear-gradient(145deg, rgba(17,29,45,.94), rgba(11,20,32,.97));
      border: 1px solid var(--line); border-radius: 20px; padding: 40px 32px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,.36);
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; justify-content: center; }
    .brand-mark {
      width: 42px; height: 42px; display: grid; place-items: center;
      border: 1px solid rgba(37,212,196,.4); border-radius: 12px;
      background: rgba(37,212,196,.08);
    }
    .brand-mark svg { width: 26px; fill: none; stroke: var(--cyan); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .brand-dot { stroke: var(--cyan-2); }
    .brand h1 { font-size: 20px; letter-spacing: .1em; }
    .brand span { display: block; font-size: 11px; color: var(--muted); }
    h2 { font-size: 16px; text-align: center; margin-bottom: 6px; }
    .sub { text-align: center; color: var(--muted); font-size: 12px; margin-bottom: 28px; }

    .step { display: none; }
    .step.active { display: block; }

    label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 6px; }
    input[type="email"], input[type="text"] {
      width: 100%; height: 48px; padding: 0 14px; font-size: 15px; color: var(--text);
      background: rgba(255,255,255,.04); border: 1px solid var(--line);
      border-radius: 10px; outline: none; transition: .18s;
    }
    input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(37,212,196,.08); }
    .code-row { display: flex; gap: 10px; }
    .code-row input { flex: 1; }
    .send-btn {
      height: 48px; padding: 0 14px; white-space: nowrap; font-size: 12px; cursor: pointer;
      border: 1px solid var(--cyan); background: rgba(37,212,196,.06);
      color: var(--cyan); border-radius: 10px; transition: .18s;
    }
    .send-btn:hover { background: rgba(37,212,196,.12); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .submit-btn {
      width: 100%; height: 48px; margin-top: 24px; font-size: 14px; font-weight: 600; cursor: pointer;
      border: 0; border-radius: 10px; background: var(--cyan); color: #071217;
      transition: .18s;
    }
    .submit-btn:hover { background: #3ddfd3; }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg { color: #ff6678; font-size: 11px; margin-top: 8px; min-height: 18px; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: var(--muted); font-size: 11px; cursor: pointer; }
    .back-link:hover { color: var(--cyan); }
    .dev-hint { margin-top: 20px; padding: 10px 14px; border-radius: 8px; font-size: 10px; color: var(--cyan); text-align: center; background: rgba(37,212,196,.06); border: 1px solid rgba(37,212,196,.1); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 44 44"><path d="M10 29.5 18.2 21l5.7 5.3L34 14"/><path class="brand-dot" d="M34 14h-5.5M34 14v5.5"/></svg>
      </div>
      <div><h1>见势</h1><span>A股热点雷达</span></div>
    </div>

    <!-- 步骤1：输入邮箱 -->
    <div class="step active" id="stepEmail">
      <h2>邮箱登录</h2>
      <p class="sub">首次登录将自动注册账号</p>
      <label>邮箱地址</label>
      <input type="email" id="emailInput" placeholder="请输入邮箱" autocomplete="email" />
      <p class="error-msg" id="emailError"></p>
      <button class="submit-btn" id="sendCodeBtn">获取验证码</button>
    </div>

    <!-- 步骤2：输入验证码 -->
    <div class="step" id="stepCode">
      <h2>输入验证码</h2>
      <p class="sub">已发送至 <strong id="emailDisplay"></strong></p>
      <div class="code-row">
        <input type="text" id="codeInput" placeholder="6位验证码" maxlength="6" autocomplete="one-time-code" />
        <button class="send-btn" id="resendBtn" disabled>重新发送</button>
      </div>
      <p class="error-msg" id="codeError"></p>
      <button class="submit-btn" id="verifyBtn">验证并登录</button>
      <div class="back-link" id="backToEmail">← 更换邮箱</div>
    </div>

    <div class="dev-hint" id="devHint" style="display:none">🔧 开发模式：验证码将打印在服务器控制台</div>
  </div>

  <script>
    const API = '/api/auth';
    let countdown = 0;
    let countdownTimer = null;

    // 检查是否已登录
    const token = localStorage.getItem('jianshi_token');
    if (token) {
      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })
        .then(r => { if (r.ok) window.location.href = '/'; });
    }

    // 开发模式提示
    fetch('/api/overview').then(() => {
      document.getElementById('devHint').style.display = 'block';
    }).catch(() => {});

    const emailInput = document.getElementById('emailInput');
    const codeInput = document.getElementById('codeInput');
    const sendCodeBtn = document.getElementById('sendCodeBtn');
    const resendBtn = document.getElementById('resendBtn');
    const verifyBtn = document.getElementById('verifyBtn');
    const stepEmail = document.getElementById('stepEmail');
    const stepCode = document.getElementById('stepCode');
    const emailDisplay = document.getElementById('emailDisplay');
    const emailError = document.getElementById('emailError');
    const codeError = document.getElementById('codeError');

    function showStep(step) {
      stepEmail.classList.toggle('active', step === 'email');
      stepCode.classList.toggle('active', step === 'code');
    }

    function startCountdown() {
      countdown = 60;
      resendBtn.disabled = true;
      resendBtn.textContent = countdown + 's';
      countdownTimer = setInterval(() => {
        countdown--;
        resendBtn.textContent = countdown + 's';
        if (countdown <= 0) {
          clearInterval(countdownTimer);
          resendBtn.disabled = false;
          resendBtn.textContent = '重新发送';
        }
      }, 1000);
    }

    sendCodeBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailError.textContent = '请输入正确的邮箱地址';
        return;
      }
      emailError.textContent = '';
      sendCodeBtn.disabled = true;
      sendCodeBtn.textContent = '发送中...';

      try {
        const r = await fetch(API + '/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await r.json();
        if (data.success) {
          emailDisplay.textContent = email;
          showStep('code');
          startCountdown();
          codeInput.focus();
        } else {
          emailError.textContent = data.error || '发送失败';
        }
      } catch {
        emailError.textContent = '网络错误，请重试';
      }
      sendCodeBtn.disabled = false;
      sendCodeBtn.textContent = '获取验证码';
    });

    resendBtn.addEventListener('click', async () => {
      if (countdown > 0) return;
      const email = emailInput.value.trim();
      try {
        const r = await fetch(API + '/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await r.json();
        if (data.success) {
          startCountdown();
        } else {
          codeError.textContent = data.error || '发送失败';
        }
      } catch {
        codeError.textContent = '网络错误';
      }
    });

    verifyBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const code = codeInput.value.trim();
      if (code.length !== 6) {
        codeError.textContent = '请输入6位验证码';
        return;
      }
      codeError.textContent = '';
      verifyBtn.disabled = true;
      verifyBtn.textContent = '验证中...';

      try {
        const r = await fetch(API + '/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });
        const data = await r.json();
        if (data.success) {
          localStorage.setItem('jianshi_token', data.token);
          localStorage.setItem('jianshi_user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          codeError.textContent = data.error || '验证失败';
        }
      } catch {
        codeError.textContent = '网络错误，请重试';
      }
      verifyBtn.disabled = false;
      verifyBtn.textContent = '验证并登录';
    });

    document.getElementById('backToEmail').addEventListener('click', () => {
      showStep('email');
      clearInterval(countdownTimer);
      resendBtn.disabled = false;
      resendBtn.textContent = '重新发送';
    });

    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendCodeBtn.click(); });
    codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') verifyBtn.click(); });
  </script>
</body>
</html>
